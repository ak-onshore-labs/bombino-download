<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Bombino Express</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #ffffff;
      color: #0b6088;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 48px 32px;
      max-width: 480px;
    }

    .tagline {
      color: #0b6088;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .logo-wrap {
      margin-bottom: 36px;
    }

    .logo-wrap img {
      width: 260px;
      mix-blend-mode: multiply;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .store-link {
      display: block;
      line-height: 0;
      transition: opacity 0.2s;
    }

    .store-link:hover {
      opacity: 0.85;
    }

    .store-link img {
      height: 52px;
      width: auto;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: #fec631;
      margin: 44px auto 0;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="tagline">Bringing the world closer</p>

    <div class="logo-wrap">
      <img src="bombino-logo-01.png" alt="Bombino Express" />
    </div>

    <div class="buttons">
      <a class="store-link" href="https://apps.apple.com/in/app/bombino-expess/id6763043971" target="_blank" rel="noopener noreferrer">
        <img src="app-store-badge.png" alt="Download on the App Store" />
      </a>

      <a class="store-link" href="https://play.google.com/store/apps/details?id=com.bombinoexp.app" target="_blank" rel="noopener noreferrer">
        <img src="google-play-badge.png" alt="Get it on Google Play" />
      </a>
    </div>

    <div class="divider"></div>
  </div>
</body>
</html>
