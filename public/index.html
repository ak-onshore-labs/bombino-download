<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Bombino Express</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand-blue: #0b6088;
      --brand-gold: #fec631;
      --content-width: 260px;
    }

    body {
      background-color: #ffffff;
      color: var(--brand-blue);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      padding: 56px 32px;
      max-width: 480px;
      width: 100%;
    }

    .tagline {
      color: var(--brand-blue);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .logo-wrap {
      margin-bottom: 28px;
    }

    .logo-wrap img {
      width: var(--content-width);
      max-width: 100%;
      height: auto;
      mix-blend-mode: multiply;
    }

    .subtitle {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15.5px;
      font-weight: 300;
      line-height: 1.72;
      letter-spacing: -0.01em;
      color: #4a6270;
      width: var(--content-width);
      max-width: 100%;
      margin: 0 auto 36px;
    }

    .subtitle em {
      font-style: italic;
      font-weight: 400;
      color: #3a5563;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      width: var(--content-width);
      max-width: 100%;
      margin: 0 auto;
    }

    .store-link {
      display: block;
      width: 100%;
      line-height: 0;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      box-shadow: 0 1px 3px rgba(11, 96, 136, 0.08);
    }

    .store-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(11, 96, 136, 0.14);
    }

    .store-link:active {
      transform: translateY(0);
    }

    .store-link img {
      width: 100%;
      height: 48px;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    .divider {
      width: 32px;
      height: 3px;
      background: var(--brand-gold);
      margin: 40px auto 0;
      border-radius: 2px;
    }

    @media (max-width: 360px) {
      :root {
        --content-width: 100%;
      }

      .subtitle {
        font-size: 14.5px;
        padding: 0 4px;
      }

      .store-link img {
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="tagline">Bringing the world closer</p>

    <div class="logo-wrap">
      <img src="bombino-logo-01.png" alt="Bombino Express" />
    </div>

    <p class="subtitle">
      Create shipments from anywhere to anywhere at the best rates. Track in real time, compare carriers, and get instant support, <em>all in one app.</em>
    </p>

    <div class="buttons">
      <a class="store-link" href="https://apps.apple.com/in/app/bombino-expess/id6763043971" target="_blank" rel="noopener noreferrer">
        <img src="app-store-badge.png" alt="Download on the App Store" />
      </a>

      <a class="store-link" href="https://play.google.com/store/apps/details?id=com.bombinoexp.app" target="_blank" rel="noopener noreferrer">
        <img src="google-play-badge.png" alt="Get it on Google Play" />
      </a>
    </div>

    <div class="divider"></div>
  </div>
</body>
</html>
