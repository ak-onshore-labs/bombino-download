<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Bombino Express</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand-blue: #0b6088;
      --brand-gold: #fec631;
      --subtitle-amber: #c9920a;
      --content-width: 260px;
      --store-btn-height: 77px;
    }

    body {
      color: var(--brand-blue);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(ellipse 70% 55% at 12% 18%, rgba(11, 96, 136, 0.13) 0%, transparent 68%),
        radial-gradient(ellipse 65% 50% at 88% 82%, rgba(254, 198, 49, 0.16) 0%, transparent 68%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255, 255, 255, 0.92) 0%, transparent 100%),
        linear-gradient(135deg,
          rgba(11, 96, 136, 0.07) 0%,
          rgba(255, 255, 255, 0.98) 42%,
          rgba(255, 255, 255, 0.98) 58%,
          rgba(254, 198, 49, 0.09) 100%);
      background-color: #f8fbfd;
    }

    .container {
      text-align: center;
      padding: 56px 32px;
      max-width: 480px;
      width: 100%;
      position: relative;
    }

    .container::before {
      content: '';
      position: absolute;
      inset: -40px -20px;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.55) 0%, transparent 72%);
      pointer-events: none;
      z-index: 0;
    }

    .container > * {
      position: relative;
      z-index: 1;
    }

    .tagline {
      color: var(--brand-blue);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .logo-wrap {
      margin-bottom: 28px;
    }

    .logo-wrap img {
      width: var(--content-width);
      max-width: 100%;
      height: auto;
      mix-blend-mode: multiply;
    }

    .subtitle {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
      font-size: 16px;
      font-weight: 400;
      font-style: italic;
      line-height: 1.75;
      letter-spacing: 0.01em;
      color: var(--subtitle-amber);
      width: var(--content-width);
      max-width: 100%;
      margin: 0 auto 36px;
    }

    .subtitle em {
      font-style: italic;
      color: var(--subtitle-amber);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      width: var(--content-width);
      max-width: 100%;
      margin: 0 auto;
    }

    .store-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: var(--store-btn-height);
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow:
        0 2px 8px rgba(11, 96, 136, 0.1),
        0 1px 2px rgba(0, 0, 0, 0.06);
    }

    .store-link:hover {
      transform: translateY(-3px);
      box-shadow:
        0 10px 28px rgba(11, 96, 136, 0.16),
        0 4px 10px rgba(201, 146, 10, 0.1);
    }

    .store-link:active {
      transform: translateY(-1px);
    }

    .store-link img {
      width: 100%;
      height: auto;
      display: block;
      flex-shrink: 0;
    }

    .divider {
      width: 32px;
      height: 3px;
      background: var(--brand-gold);
      margin: 40px auto 0;
      border-radius: 2px;
      box-shadow: 0 1px 6px rgba(254, 198, 49, 0.35);
    }

    @media (max-width: 360px) {
      :root {
        --content-width: 100%;
        --store-btn-height: 68px;
      }

      .subtitle {
        font-size: 15px;
        padding: 0 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="tagline">Bringing the world closer</p>

    <div class="logo-wrap">
      <img src="bombino-logo-01.png" alt="Bombino Express" />
    </div>

    <p class="subtitle">
      Create shipments from anywhere to anywhere at the best rates. Track in real time, compare carriers, and get instant support, <em>all in one app.</em>
    </p>

    <div class="buttons">
      <a class="store-link" href="https://apps.apple.com/in/app/bombino-expess/id6763043971" target="_blank" rel="noopener noreferrer">
        <img src="app-store-badge.png" alt="Download on the App Store" />
      </a>

      <a class="store-link" href="https://play.google.com/store/apps/details?id=com.bombinoexp.app" target="_blank" rel="noopener noreferrer">
        <img src="google-play-badge.png" alt="Get it on Google Play" />
      </a>
    </div>

    <div class="divider"></div>
  </div>
</body>
</html>
